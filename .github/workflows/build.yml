name: Build

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: shard
            launcher: Run-Shard.command
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: shard.exe
            launcher: Run-Shard.bat
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Prepare release folder
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} release/
          cp ${{ matrix.launcher }} release/
      - uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.target }}
          path: release/
